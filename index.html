<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
color:#fff;
overflow-x:hidden;
background:url('bg.jpg') no-repeat center center/cover;
}

/* soft overlay instead of black */
.overlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(255,255,255,0.25);
backdrop-filter:blur(2px);
z-index:-1;
}

header{
height:100vh;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
flex-direction:column;
position:relative;
}

h1{
font-family:'Playfair Display',serif;
font-size:60px;
color:#fff;
text-shadow:0 4px 20px rgba(0,0,0,0.4);
}

.subtitle{
margin-top:15px;
font-size:20px;
}

.date{
margin-top:10px;
font-size:22px;
letter-spacing:2px;
}

.section{
padding:80px 20px;
text-align:center;
background:rgba(255,255,255,0.15);
backdrop-filter:blur(6px);
margin:20px;
border-radius:20px;
}

.story{
max-width:800px;
margin:auto;
line-height:1.8;
font-size:18px;
color:#fff;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:15px;
transition:0.3s;
}

.gallery img:hover{
transform:scale(1.05);
}

.countdown{
font-size:30px;
margin-top:20px;
font-weight:500;
}

audio{
margin-top:20px;
}

.rsvp input, .rsvp textarea{
width:80%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
}

.rsvp button{
padding:12px 25px;
border:none;
background:#ffffff;
color:#000;
border-radius:10px;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
font-size:14px;
}

.heart{
position:fixed;
top:-10px;
color:pink;
animation:fall linear infinite;
}

@keyframes fall{
0%{transform:translateY(-10px) rotate(0);}
100%{transform:translateY(110vh) rotate(360deg);}
}
</style>
</head>

<body>

<div class="overlay"></div>

<header>
<h1>Սիրով հրավիրում ենք</h1>
<div class="subtitle">Մեր կյանքի ամենակարևոր օրը</div>
<div class="date">17.10.2026</div>

<div class="countdown" id="countdown"></div>

<audio controls autoplay loop>
<source src="John Legend - All of Me.mp3" type="audio/mp3">
</audio>
</header>

<section class="section">
<h2>Մեր պատմությունը</h2>
<div class="story">
Դու իմ վերջինը՝ գիտակցաբար,  
Եվ իմ միակը՝ ճակատագրով...  
Այս օրը մենք որոշեցինք միասին սկսել մեր նոր ճանապարհը՝ սիրով, հավատով և հավերժությամբ։
</div>
</section>

<section class="section">
<h2>Լուսանկարներ</h2>
<div class="gallery">
<img src="gallery1.jpg">
<img src="gallery2.jpg">
<img src="gallery3.jpg">
<img src="gallery4.jpg">
</div>
</section>

<section class="section">
<h2>Տեղանք</h2>
<iframe src="https://www.google.com/maps/embed?pb=!1m18..." width="100%" height="300" style="border:0;border-radius:15px;"></iframe>
</section>

<section class="section rsvp">
<h2>RSVP</h2>
<input type="text" placeholder="Անուն">
<input type="text" placeholder="Ազգանուն">
<textarea placeholder="Հաղորդագրություն"></textarea>
<br>
<button>Ուղարկել</button>
</section>

<footer>
Սիրով սպասում ենք ձեզ ❤️
</footer>

<script>
// countdown
const weddingDate = new Date("Oct 17, 2026 00:00:00").getTime();

setInterval(()=>{
const now = new Date().getTime();
const diff = weddingDate - now;

const days = Math.floor(diff/(1000*60*60*24));
const hours = Math.floor((diff%(1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((diff%(1000*60*60))/(1000*60));
const seconds = Math.floor((diff%(1000*60))/1000);

document.getElementById("countdown").innerHTML =
days+" օր "+hours+" ժ "+minutes+" ր "+seconds+" վ";
},1000);

// floating hearts
function createHeart(){
const heart=document.createElement("div");
heart.classList.add("heart");
heart.innerHTML="❤";
heart.style.left=Math.random()*100+"vw";
heart.style.animationDuration=(3+Math.random()*5)+"s";
document.body.appendChild(heart);

setTimeout(()=>heart.remove(),8000);
}
setInterval(createHeart,400);
</script>

</body>
</html>
