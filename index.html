<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>

/* =========================
   RESET
========================= */
* {
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body {
  font-family: "Montserrat", sans-serif;
  background:#0b0a0f;
  color:#fff;
  overflow-x:hidden;
}

/* =========================
   INTRO LOADER
========================= */
#loader {
  position:fixed;
  inset:0;
  background:#0b0a0f;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-direction:column;
  z-index:9999;
}

.loader-heart {
  font-size:40px;
  animation:pulse 1.5s infinite;
}

@keyframes pulse {
  0% {transform:scale(1);}
  50% {transform:scale(1.2);}
  100% {transform:scale(1);}
}

/* =========================
   HERO
========================= */
.hero {
  height:100vh;
  background:url("main.jpg") center/cover no-repeat;
  background-attachment:fixed;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  position:relative;
}

.hero::after {
  content:"";
  position:absolute;
  inset:0;
  background:rgba(0,0,0,0.55);
}

.hero-content {
  position:relative;
  z-index:2;
  animation:fadeInUp 2s ease;
}

.hero h1 {
  font-family:"Playfair Display", serif;
  font-size:52px;
}

.hero p {
  margin-top:10px;
  opacity:0.9;
}

/* =========================
   SECTIONS
========================= */
.section {
  padding:120px 20px;
  text-align:center;
  opacity:0;
  transform:translateY(60px);
  transition:1s ease;
}

.section.visible {
  opacity:1;
  transform:translateY(0);
}

.card {
  max-width:700px;
  margin:auto;
  padding:30px;
  background:rgba(255,255,255,0.06);
  border:1px solid rgba(255,255,255,0.1);
  border-radius:20px;
  backdrop-filter:blur(12px);
}

/* =========================
   COUNTDOWN
========================= */
.countdown {
  display:flex;
  justify-content:center;
  gap:20px;
  margin-top:20px;
}

.countdown div {
  text-align:center;
}

/* =========================
   GALLERY
========================= */
.gallery {
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(200px,1fr));
  gap:10px;
  margin-top:20px;
}

.gallery img {
  width:100%;
  border-radius:10px;
}

/* =========================
   INPUTS
========================= */
input, textarea {
  width:100%;
  padding:12px;
  margin:10px 0;
  border-radius:10px;
  border:none;
}

/* =========================
   BUTTON
========================= */
button {
  padding:12px 25px;
  border:none;
  border-radius:30px;
  background:linear-gradient(135deg,#ff4d6d,#ff8fa3);
  cursor:pointer;
}

/* =========================
   PARTICLES
========================= */
.particle, .heart {
  position:fixed;
  width:6px;
  height:6px;
  background:rgba(255,255,255,0.3);
  border-radius:50%;
  animation:float 10s linear infinite;
}

.heart {
  background:pink;
  transform:rotate(45deg);
}

@keyframes float {
  from {transform:translateY(100vh);}
  to {transform:translateY(-10vh);}
}

/* =========================
   MAP
========================= */
.map {
  width:100%;
  height:300px;
  border-radius:20px;
  overflow:hidden;
  margin-top:20px;
}

iframe {
  width:100%;
  height:100%;
  border:0;
}

/* =========================
   ANIMATIONS
========================= */
@keyframes fadeInUp {
  from {opacity:0; transform:translateY(40px);}
  to {opacity:1; transform:translateY(0);}
}

audio {display:none;}

</style>
</head>

<body>

<!-- LOADER -->
<div id="loader">
  <div class="loader-heart">💖</div>
  <p>Loading love story...</p>
</div>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="John Legend - All of Me (Official Video).mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Սիրով հրավիրում ենք</h1>
    <p>Դու իմ վերջինը՝ գիտակցաբար, Եվ իմ միակը՝ ճակատագրով...</p>
    <p><strong>17.10.2026</strong></p>
  </div>
</section>

<!-- COUNTDOWN -->
<section class="section">
  <div class="card">
    <h2>Մինչ մեր մեծ օրը</h2>
    <div class="countdown">
      <div><span id="days"></span><p>Օր</p></div>
      <div><span id="hours"></span><p>Ժամ</p></div>
      <div><span id="minutes"></span><p>Րոպե</p></div>
      <div><span id="seconds"></span><p>Վայրկյան</p></div>
    </div>
  </div>
</section>

<!-- DETAILS -->
<section class="section">
  <div class="card">
    <h2>Միջոցառման մանրամասներ</h2>
    <p>📍 Երևան</p>
    <p>🕒 17:00</p>

    <div class="map">
      <iframe src="https://maps.google.com/maps?q=Yerevan&t=&z=13&ie=UTF8&iwloc=&output=embed"></iframe>
    </div>
  </div>
</section>

<!-- GALLERY -->
<section class="section">
  <div class="card">
    <h2>Մեր պատմությունը</h2>
    <div class="gallery">
      <img src="1.jpg">
      <img src="2.jpg">
      <img src="3.jpg">
      <img src="4.jpg">
    </div>
  </div>
</section>

<!-- RSVP -->
<section class="section">
  <div class="card">
    <h2>RSVP</h2>

    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input name="name" placeholder="Անուն Ազգանուն" required>
      <textarea name="msg" placeholder="Հաստատում"></textarea>
      <button type="submit">Ուղարկել</button>
    </form>
  </div>
</section>

<script>

/* LOADER */
window.onload = () => {
  setTimeout(()=> {
    document.getElementById("loader").style.display="none";
  }, 2000);
};

/* SCROLL */
const sections = document.querySelectorAll(".section");
const obs = new IntersectionObserver(entries=>{
  entries.forEach(e=>{
    if(e.isIntersecting) e.target.classList.add("visible");
  });
});
sections.forEach(s=>obs.observe(s));

/* PARTICLES */
for(let i=0;i<60;i++){
  const p=document.createElement("div");
  p.className="particle";
  p.style.left=Math.random()*100+"vw";
  document.body.appendChild(p);
}

/* COUNTDOWN */
const target = new Date("2026-10-17T17:00:00").getTime();

setInterval(()=>{
  const now = new Date().getTime();
  const diff = target-now;

  document.getElementById("days").innerText=Math.floor(diff/(1000*60*60*24));
  document.getElementById("hours").innerText=Math.floor(diff/(1000*60*60)%24);
  document.getElementById("minutes").innerText=Math.floor(diff/(1000*60)%60);
  document.getElementById("seconds").innerText=Math.floor(diff/1000%60);
},1000);

</script>

</body>
</html>
