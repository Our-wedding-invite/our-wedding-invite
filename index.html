<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=Poppins:wght@300;400&display=swap" rel="stylesheet">

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins',sans-serif;
    background:#faf6f2;
    color:#444;
    text-align:center;
}

.hero{
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:linear-gradient(rgba(255,255,255,0.75),rgba(255,255,255,0.75)),
    url('https://images.unsplash.com/photo-1519741497674-611481863552?w=1600');
    background-size:cover;
    background-position:center;
}

h1{
    font-family:'Playfair Display',serif;
    font-size:4rem;
    color:#8b5e5e;
}

.subtitle{
    font-size:1.4rem;
    margin-top:15px;
}

.heart{
    color:#d6336c;
    font-size:50px;
    animation:pulse 1.5s infinite;
    margin:20px 0;
}

@keyframes pulse{
    0%{transform:scale(1);}
    50%{transform:scale(1.3);}
    100%{transform:scale(1);}
}

.section{
    padding:70px 20px;
}

.section h2{
    font-family:'Playfair Display',serif;
    color:#8b5e5e;
    margin-bottom:25px;
}

.calendar{
    width:220px;
    margin:auto;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 10px 25px rgba(0,0,0,0.1);
}

.calendar-top{
    background:#d6336c;
    color:white;
    padding:15px;
    font-size:22px;
}

.calendar-body{
    background:white;
    padding:30px;
}

.date{
    font-size:55px;
    font-weight:bold;
}

.month{
    font-size:22px;
}

#countdown{
    display:flex;
    justify-content:center;
    gap:20px;
    flex-wrap:wrap;
}

.time-box{
    background:white;
    padding:20px;
    border-radius:15px;
    width:100px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.time-box span{
    display:block;
    font-size:35px;
    font-weight:bold;
    color:#d6336c;
}

.location{
    max-width:500px;
    margin:20px auto;
    padding:25px;
    background:white;
    border-radius:20px;
    box-shadow:0 5px 20px rgba(0,0,0,0.1);
}

.location a{
    display:inline-block;
    margin-top:15px;
    text-decoration:none;
    background:#d6336c;
    color:white;
    padding:10px 20px;
    border-radius:30px;
}

form{
    max-width:400px;
    margin:auto;
}

input, textarea{
    width:100%;
    padding:15px;
    margin-bottom:15px;
    border-radius:10px;
    border:1px solid #ddd;
}

button{
    background:#d6336c;
    color:white;
    border:none;
    padding:15px 35px;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

footer{
    padding:30px;
    background:#8b5e5e;
    color:white;
}

@media(max-width:768px){
    h1{
        font-size:2.8rem;
    }
}
</style>
</head>

<body>

<section class="hero">
    <h1>Anna & David</h1>
    <div class="heart">♥</div>
    <p class="subtitle">We are getting married</p>
    <p class="subtitle">17 October 2026</p>
</section>

<section class="section">
    <h2>Wedding Date</h2>

    <div class="calendar">
        <div class="calendar-top">October 2026 ♥</div>
        <div class="calendar-body">
            <div class="date">17</div>
            <div class="month">Saturday</div>
        </div>
    </div>
</section>

<section class="section">
    <h2>Countdown</h2>

    <div id="countdown">
        <div class="time-box">
            <span id="days">0</span>
            Days
        </div>
        <div class="time-box">
            <span id="hours">0</span>
            Hours
        </div>
        <div class="time-box">
            <span id="minutes">0</span>
            Minutes
        </div>
        <div class="time-box">
            <span id="seconds">0</span>
            Seconds
        </div>
    </div>
</section>

<section class="section">
    <h2>Ceremony</h2>

    <div class="location">
        <h3>St. Mary's Church</h3>
        <p>Yerevan, Armenia</p>

        <a href="https://maps.google.com/?q=St+Mary+Church+Yerevan"
           target="_blank">
           Open Map
        </a>
    </div>
</section>

<section class="section">
    <h2>Reception</h2>

    <div class="location">
        <h3>Wedding Hall Name</h3>
        <p>Yerevan, Armenia</p>

        <a href="https://maps.google.com/?q=Yerevan+Wedding+Hall"
           target="_blank">
           Open Map
        </a>
    </div>
</section>

<section class="section">
    <h2>RSVP</h2>

    <form>
        <input type="text" placeholder="Your Name" required>

        <input type="number" placeholder="Number of Guests">

        <textarea placeholder="Message"></textarea>

        <button type="submit">
            Send RSVP
        </button>
    </form>
</section>

<footer>
    With love ♥ 17.10.2026
</footer>

<script>
const weddingDate = new Date("October 17, 2026 00:00:00").getTime();

setInterval(function(){

    const now = new Date().getTime();
    const distance = weddingDate - now;

    const days = Math.floor(distance / (1000*60*60*24));
    const hours = Math.floor((distance % (1000*60*60*24)) / (1000*60*60));
    const minutes = Math.floor((distance % (1000*60*60)) / (1000*60));
    const seconds = Math.floor((distance % (1000*60)) / 1000);

    document.getElementById("days").innerHTML = days;
    document.getElementById("hours").innerHTML = hours;
    document.getElementById("minutes").innerHTML = minutes;
    document.getElementById("seconds").innerHTML = seconds;

},1000);
</script>

</body>
</html>
