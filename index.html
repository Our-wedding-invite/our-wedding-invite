<!DOCTYPE html>
<html lang="hy">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Invitation</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: "Montserrat", sans-serif;
  background: #0e0b10;
  color: #fff;
  overflow-x: hidden;
}

/* HERO */
.hero {
  height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  text-align: center;
  position: relative;
  background: url("main.jpg") center/cover no-repeat;
  background-attachment: fixed;
}

.hero::after {
  content: "";
  position: absolute;
  inset: 0;
  background: radial-gradient(circle at center, rgba(0,0,0,0.2), rgba(0,0,0,0.85));
}

.hero-content {
  position: relative;
  z-index: 2;
  animation: fadeInUp 2s ease forwards;
  padding: 20px;
}

.hero h1 {
  font-family: "Playfair Display", serif;
  font-size: 48px;
  margin-bottom: 10px;
}

.hero p {
  font-size: 18px;
  opacity: 0.9;
}

/* SECTIONS */
.section {
  padding: 100px 20px;
  text-align: center;
  opacity: 0;
  transform: translateY(50px);
  transition: all 1s ease;
}

.section.visible {
  opacity: 1;
  transform: translateY(0);
}

.section h2 {
  font-family: "Playfair Display", serif;
  font-size: 34px;
  margin-bottom: 20px;
}

/* CARD */
.card {
  max-width: 600px;
  margin: auto;
  padding: 30px;
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1);
  border-radius: 20px;
  backdrop-filter: blur(12px);
}

/* INPUTS */
input, textarea {
  width: 100%;
  padding: 12px;
  margin: 10px 0;
  border-radius: 10px;
  border: none;
  outline: none;
  font-family: inherit;
}

/* BUTTON */
button {
  padding: 12px 25px;
  border: none;
  border-radius: 30px;
  background: linear-gradient(135deg, #ff4d6d, #ff8fa3);
  color: white;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  transform: scale(1.05);
  box-shadow: 0 0 20px rgba(255,77,109,0.5);
}

/* PARTICLES */
.particle {
  position: absolute;
  width: 6px;
  height: 6px;
  background: rgba(255,255,255,0.4);
  border-radius: 50%;
  animation: float 10s linear infinite;
}

@keyframes float {
  from { transform: translateY(100vh); opacity: 0; }
  to { transform: translateY(-10vh); opacity: 1; }
}

@keyframes fadeInUp {
  from { opacity: 0; transform: translateY(40px); }
  to { opacity: 1; transform: translateY(0); }
}

/* MUSIC HIDDEN */
audio { display: none; }
</style>
</head>

<body>

<!-- MUSIC -->
<audio autoplay loop>
  <source src="John Legend - All of Me (Official Video).mp3" type="audio/mp3">
</audio>

<!-- HERO -->
<section class="hero">
  <div class="hero-content">
    <h1>Սիրով հրավիրում ենք մեր հարսանիքին</h1>
    <p>Դու իմ վերջինը՝ գիտակցաբար, Եվ իմ միակը՝ ճակատագրով...</p>
    <p><strong>17.10.2026</strong></p>
  </div>
</section>

<!-- DETAILS -->
<section class="section">
  <div class="card">
    <h2>Միջոցառման մանրամասներ</h2>
    <p>📍 Երևան, Հայաստան</p>
    <p>🕒 17:00</p>
  </div>
</section>

<!-- RSVP -->
<section class="section">
  <div class="card">
    <h2>RSVP</h2>

    <!-- REAL WORKING FORM (Formspree) -->
    <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
      <input type="text" name="name" placeholder="Անուն Ազգանուն" required />
      <textarea name="message" placeholder="Հաստատում / Մեկնաբանություն"></textarea>
      <button type="submit">Հաստատել ներկայությունը</button>
    </form>

    <p style="font-size:12px; opacity:0.6; margin-top:10px;">
      Ձեր պատասխանները կուղարկվեն մեզ անմիջապես
    </p>
  </div>
</section>

<script>
// scroll reveal
const sections = document.querySelectorAll(".section");

const observer = new IntersectionObserver(entries => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add("visible");
    }
  });
}, { threshold: 0.2 });

sections.forEach(sec => observer.observe(sec));

// floating particles
for(let i=0;i<40;i++){
  const p = document.createElement("div");
  p.className = "particle";
  p.style.left = Math.random()*100 + "vw";
  p.style.animationDuration = (6 + Math.random()*6) + "s";
  document.body.appendChild(p);
}
</script>

</body>
</html>
